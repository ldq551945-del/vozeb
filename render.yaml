services:
  - type: web
    name: vozeb
    runtime: docker
    plan: free
    autoDeployTrigger: off
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_OPTIONS
        value: --max-old-space-size=384
      - key: UV_THREADPOOL_SIZE
        value: "2"
      - key: VOZEB_DATA_DIR
        value: /app/web/.data
      - key: VOZEB_INTERNAL_ORIGIN
        value: http://127.0.0.1:3000
